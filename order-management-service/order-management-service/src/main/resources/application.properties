spring.application.name=order-management-service

# Server
server.port=8081

# Datasource
#spring.datasource.url=jdbc:mysql://localhost:3306/oms_db
#spring.datasource.username=root
#spring.datasource.password=root
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:mysql://localhost:3306/oms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# HikariCP Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis (Optional)
spring.redis.host=localhost
spring.redis.port=6379

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,metrics,env


spring.jpa.open-in-view=false

# ******** security Configuration ************
security.public-endpoints=/api/**,/actuator/**,/swagger-ui/**,/v3/api-docs/**
management.health.redis.enabled=false


